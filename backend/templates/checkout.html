<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Your Company</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e8eaed;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: #5c6bc0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
    }
    header .company-name { font-size: 20px; font-weight: 600; color: #1a1a2e; }
    header .breadcrumb { margin-left: auto; font-size: 13px; color: #9e9e9e; }
    header .breadcrumb span { color: #5c6bc0; }

    main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 420px;
      gap: 32px; max-width: 1060px; width: 100%;
      margin: 40px auto; padding: 0 24px;
    }
    @media (max-width: 768px) { main { grid-template-columns: 1fr; } }

    .card {
      background: #ffffff; border-radius: 12px;
      border: 1px solid #e8eaed; padding: 28px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }

    .field-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    input[type="email"], input[type="text"], input[type="number"] {
      width: 100%; padding: 10px 14px;
      border: 1px solid #d0d5dd; border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border-color 0.2s; background: #fafafa;
    }
    input:focus { border-color: #5c6bc0; background: #fff; }

    #checkout-btn {
      width: 100%; padding: 13px;
      background: #5c6bc0; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    #checkout-btn:hover { background: #4a57ab; }
    #checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      display: none; margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
    }
    #status.info  { background: #e8eaf6; color: #3949ab; display: block; }
    #status.error { background: #fdecea; color: #c62828; display: block; }

    .order-summary .item {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px;
    }
    .order-summary .item:last-child { border-bottom: none; }
    .order-summary .item .name { color: #444; }
    .order-summary .item .price { font-weight: 500; }
    .order-summary .total-row {
      display: flex; justify-content: space-between;
      margin-top: 16px; padding-top: 16px;
      border-top: 2px solid #e8eaed; font-weight: 700; font-size: 16px;
    }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      background: #e8f5e9; color: #2e7d32; margin-left: 8px;
    }

    .trust {
      display: flex; gap: 16px; margin-top: 20px;
      justify-content: center; flex-wrap: wrap;
    }
    .trust-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #888;
    }
    .trust-item svg { width: 14px; height: 14px; fill: #888; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Y</div>
    <div class="company-name">Your Company</div>
    <div class="breadcrumb">Shop &rsaquo; <span>Checkout</span> &rsaquo; Confirmation</div>
  </header>

  <main>
    <section>
      <div class="card">
        <h2>Contact &amp; Checkout</h2>

        <div class="field-group">
          <label for="email-input">Email address</label>
          <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field-group">
          <label for="variant-input">Product Variant ID</label>
          <input type="text" id="variant-input" placeholder="gid://shopify/ProductVariant/..." />
          <small style="color:#999;">Enter a Shopify ProductVariant GID</small>
        </div>

        <div class="field-group">
          <label for="qty-input">Quantity</label>
          <input type="number" id="qty-input" value="1" min="1" />
        </div>

        <button id="checkout-btn" type="button">Create Cart &amp; Checkout</button>
        <div id="status"></div>

        <div class="trust">
          <div class="trust-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2
                2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0
                0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0
                4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
            </svg>
            SSL Secured
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25
                21.15 21 16.25 21 11V5l-9-4zm-1 13l-3-3
                1.41-1.41L11 11.17l4.59-4.58L17 8l-6 6z"/>
            </svg>
            Buyer Protection
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2
                2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0
                14H4v-6h16v6zm0-10H4V6h16v2z"/>
            </svg>
            Powered by Shopify
          </div>
        </div>
      </div>
    </section>

    <aside>
      <div class="card order-summary">
        <h2>Order Summary <span class="badge" id="item-count">1 item</span></h2>
        <div id="summary-items">
          <div class="item">
            <span class="name">Product Variant</span>
            <span class="price" id="summary-qty">x1</span>
          </div>
        </div>
        <div class="total-row">
          <span>Total</span>
          <span id="summary-total">Calculated at checkout</span>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const CART_API = "/api/cart";

    function showStatus(msg, type = "info") {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = type;
    }

    document.getElementById("qty-input").addEventListener("input", () => {
      const qty = document.getElementById("qty-input").value || 1;
      document.getElementById("summary-qty").textContent = `x${qty}`;
    });

    document.getElementById("checkout-btn").addEventListener("click", async () => {
      const email = document.getElementById("email-input").value.trim();
      const variantId = document.getElementById("variant-input").value.trim();
      const quantity = parseInt(document.getElementById("qty-input").value, 10) || 1;

      if (!email) { showStatus("Please enter your email address.", "error"); return; }
      if (!variantId) { showStatus("Please enter a product variant ID.", "error"); return; }

      const btn = document.getElementById("checkout-btn");
      btn.disabled = true;
      showStatus("Creating your cart...");

      try {
        const res = await fetch(CART_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lines: [{ merchandise_id: variantId, quantity }],
            buyer_identity: { email },
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "Cart creation failed.");
        }

        const cart = await res.json();

        // Update summary with actual cost
        if (cart.cost && cart.cost.total) {
          document.getElementById("summary-total").textContent =
            `${cart.cost.total.amount} ${cart.cost.total.currencyCode}`;
        }

        showStatus("Redirecting to checkout...");
        window.location.href = cart.checkout_url;

      } catch (err) {
        showStatus(err.message, "error");
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
